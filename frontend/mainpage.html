<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="db/connect.js"></script>
    <script src="endpoint-user.js"></script>
    <link rel="stylesheet" href="styles.css" />
    <title>Mainpage</title>
  </head>
  <body>
    <header>
      <h1>BinaryFlow</h1>
    </header>

<!-- ALT I centerContent centreres og stables lodret-->
    <div id="centerContent">
<!-- MOOD MENU -->
      <div class="moodMenu">
        <div>
          <button class="" onclick="showEnergetic()">
            <p class="moodButtonText">Energetic</p>
          </button>
        </div>
        <div>
          <button class="" onclick="showChill()">
            <p class="moodButtonText">Chill</p>
          </button>
        </div>
        <div>
          <button class="" onclick="showParty()">
            <p class="moodButtonText">Party</p>
          </button>
        </div>
        <div>
          <button class="" onclick="showHappy()">
            <p class="moodButtonText">Happy</p>
          </button>
        </div>
        <div>
          <button class="" onclick="showRomantic()">
            <p class="moodButtonText">Romantic</p>
          </button>
        </div>
        <div>
          <button class="" onclick="showLounge()">
            <p class="moodButtonText">Lounge</p>
          </button>
        </div>      
      </div>
<!-- MOOD POPUP BOXES-->
      <div class="moodBox" id="energeticBox">
        <h2>Energetic tracks</h2>
      </div>
      <div class="moodBox" id="chillBox">
        <h2>Chill tracks</h2>
      </div>
      <div class="moodBox" id="partyBox">
        <h2>Party tracks</h2>
      </div>
      <div class="moodBox" id="happyBox">
        <h2>Happy tracks</h2>
      </div>
      <div class="moodBox" id="romanticBox">
        <h2>Romantic tracks</h2>
      </div>
      <div class="moodBox" id="loungeBox">
        <h2>Lounge tracks</h2>
      </div>

    </div>

  </body>
</html>
