<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="db/connect.js"></script>
    <script src="js/endpoint-user.js"></script>
    <script src="js/ui.js" defer></script> <!--defer=script's DOMContentLoad aktiveres efter html-->
    <script src="js/mainpage.js" defer type="module"></script>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    <title>Mainpage</title>
  </head>
  <body>
    <header>
      <h1 class="binaryFlowHeader">BinaryFlow</h1>
    </header>

<!-- ALT I centerContent centreres og stables lodret -->
    <div id="centerContent">

      <!-- MOOD MENU -->
      <div class="moodMenu">
        <div>
          <button class="openMoodBox" data-target="energeticBox">
            <!--data-target=hvilken class der skal rammes via klik-->
            <p class="moodButtonText">Energetic</p>
          </button>
        </div>
        <div>
          <button class="openMoodBox" data-target="chillBox">
            <p class="moodButtonText">Chill</p>
          </button>
        </div>
        <div>
          <button class="openMoodBox" data-target="partyBox">
            <p class="moodButtonText">Party</p>
          </button>
        </div>
        <div>
          <button class="openMoodBox" data-target="happyBox">
            <p class="moodButtonText">Happy</p>
          </button>
        </div>
        <div>
          <button class="openMoodBox" data-target="romanticBox">
            <p class="moodButtonText">Romantic</p>
          </button>
        </div>
        <div>
          <button class="openMoodBox" data-target="loungeBox">
            <p class="moodButtonText">Lounge</p>
          </button>
        </div>      
      </div>

      <!-- MOOD POPUP BOXES-->
      <div class="moodBox" id="energeticBox">
        <h2 class="moodTitle">Energetic tracks</h2>
          <button class="closeMoodBox">
            ✕
          </button>
          <button class="vote-btn">
            <i class="fa-solid fa-plus"></i>
          </button>
      </div>
      <div class="moodBox" id="chillBox">
        <h2 class="moodTitle">Chill tracks</h2>
          <button class="closeMoodBox">
            ✕
          </button>
          <button class="vote-btn">
            <i class="fa-solid fa-plus"></i>
          </button>
      </div>
      <div class="moodBox" id="partyBox">
        <h2 class="moodTitle">Party tracks</h2>
          <button class="closeMoodBox">
            ✕
          </button>
          <button class="vote-btn">
            <i class="fa-solid fa-plus"></i>
          </button>
      </div>
      <div class="moodBox" id="happyBox">
        <h2 class="moodTitle">Happy tracks</h2>
          <button class="closeMoodBox">
            ✕
          </button>
          <button class="vote-btn">
            <i class="fa-solid fa-plus"></i>
          </button>
      </div>
      <div class="moodBox" id="romanticBox">
        <h2 class="moodTitle">Romantic tracks</h2>
          <button class="closeMoodBox">
            ✕
          </button>
          <button class="vote-btn">
            <i class="fa-solid fa-plus"></i>
          </button>
      </div>
      <div class="moodBox" id="loungeBox">
        <h2 class="moodTitle">Lounge tracks</h2>
          <button class="closeMoodBox">
            ✕
          </button>
          <button class="vote-btn">
            <i class="fa-solid fa-plus"></i>
          </button> 
      </div>

    </div>


<!--MENU BAR-->
<div class="menu">
  <input type="checkbox" id="menu-toggle">

  <label for="menu-toggle" class="btn">
    <i class="fa fa-bars"></i>&nbsp;&nbsp;&nbsp;Menu
  </label>

  <div class="menu-content">
    <a href="mainpage.html"><i class="fa-brands fa-odysee"></i>&nbsp;&nbsp;&nbsp;Mood selection</a>
    <a href="myvotes.html"><i class="fa-solid fa-list-ul"></i>&nbsp;&nbsp;&nbsp;My Votes</a>
    <a href="index.html"><i class="fa-solid fa-arrow-right-from-bracket"></i>&nbsp;&nbsp;&nbsp;Leave Session</a>
  </div>
</div>
  </body>
</html>
