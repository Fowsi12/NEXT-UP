<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="db/connect.js"></script>
    <script src="js/endpoint-user.js"></script>
    <script src="js/ui.js" defer></script> <!--defer=script loades efter html-->
    <link rel="stylesheet" href="styles.css" />
    <title>Mainpage</title>
  </head>
  <body>
    <header>
      <h1>BinaryFlow</h1>
    </header>

<!-- ALT I centerContent centreres og stables lodret-->
    <div id="centerContent">
<!-- MOOD MENU -->
      <div class="moodMenu">
        <div>
          <button class="openMoodBox" data-target="energeticBox">
            <!--data-target=hvilken class der skal rammes via klik-->
            <p class="moodButtonText">Energetic</p>
          </button>
        </div>
        <div>
          <button class="openMoodBox" data-target="chillBox">
            <p class="moodButtonText">Chill</p>
          </button>
        </div>
        <div>
          <button class="openMoodBox" data-target="partyBox">
            <p class="moodButtonText">Party</p>
          </button>
        </div>
        <div>
          <button class="openMoodBox" data-target="happyBox">
            <p class="moodButtonText">Happy</p>
          </button>
        </div>
        <div>
          <button class="openMoodBox" data-target="romanticBox">
            <p class="moodButtonText">Romantic</p>
          </button>
        </div>
        <div>
          <button class="openMoodBox" data-target="loungeBox">
            <p class="moodButtonText">Lounge</p>
          </button>
        </div>      
      </div>
<!-- MOOD POPUP BOXES-->
      <div class="moodBox" id="energeticBox">
        <h2 class="moodTitle">Energetic tracks</h2>
          <button class="closeMoodBox">
            ✕
          </button>
      </div>
      <div class="moodBox" id="chillBox">
        <h2 class="moodTitle">Chill tracks</h2>
          <button class="closeMoodBox">
            ✕
          </button>
      </div>
      <div class="moodBox" id="partyBox">
        <h2 class="moodTitle">Party tracks</h2>
          <button class="closeMoodBox">
            ✕
          </button>
      </div>
      <div class="moodBox" id="happyBox">
        <h2 class="moodTitle">Happy tracks</h2>
          <button class="closeMoodBox">
            ✕
          </button>
      </div>
      <div class="moodBox" id="romanticBox">
        <h2 class="moodTitle">Romantic tracks</h2>
          <button class="closeMoodBox">
            ✕
          </button>
      </div>
      <div class="moodBox" id="loungeBox">
        <h2 class="moodTitle">Lounge tracks</h2>
          <button class="closeMoodBox">
            ✕
          </button>
      </div>

    </div>

  </body>
</html>
