<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>MyVotes</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    <script src="js/myvotes.js" defer type="module"></script>
</head>
  <body>
    <h1 class="myVotesHeader">My Votes</h1>

    <!-- INVITE FRIEND BUTTON
Denne knap viser session_id, så en ven kan skrive det ind på Join-siden.
-->
<button id="inviteFriendButton" class="inviteFriendButton">
  Invite friend
</button>

<!-- INVITE FRIEND POPUP
Denne popup er skjult som standard.
Når man trykker på Invite friend, viser JavaScript session_id herinde.
-->
<div id="inviteFriendPopup" class="inviteFriendPopup">
  <button id="closeInvitePopup" class="closeInvitePopup">✕</button>

  <h3>Invite friend</h3>

  <p>Send this Session ID to your friend:</p>

  <p id="inviteSessionId" class="inviteSessionId"></p>

  <p class="inviteHelpText">
    Your friend should press Join on the front page and enter this ID.
  </p>
</div>
    
    <!-- MY VOTES WINDOW -->
    <ul class="myVotesList"></ul>
    
    <!--knapper nederst-->
    <div class="bottom-buttons">
      <!--fortryd sidste knap-->
      <button class="undoOne" title="Undo" onclick="undoLastVote()">
      <img src="images/undo_arrow.png">
      </button>
      <!--Slet alle votes knap-->
      <button class="deleteAllVotes" title="Delete all votes" onclick="deleteAllVotes()">
      <img src="images/cancel_all_votes.png">
      </button>
      <!--Bekræft votes knap-->
      <button class="confirmVotes" title="Confirm votes" onclick="confirmVotes()">
      <img src="images/confirm.png">
      </button>
    </div>


    <!--MENU BAR-->
    <div class="menu">
      <input type="checkbox" id="menu-toggle">
        <!-- checkbox er blevet lavet så det er muligt at holde dropdown nede, 
        men checkboxen er også usynlig og ligger under/i button-->
      <label for="menu-toggle" class="btn">
        <i class="fa fa-bars"></i>&nbsp;&nbsp;&nbsp;Menu
      </label>
        <!-- Label gøre det muligt at trykke på dropdown elementerne og blive 
        henvist til den rigtige side-->
      <div class="menu-content">
        <a href="mainpage.html"><i class="fa-brands fa-odysee"></i>&nbsp;&nbsp;&nbsp;Mood selection</a>
        <a href="myvotes.html"><i class="fa-solid fa-list-ul"></i>&nbsp;&nbsp;&nbsp;My Votes</a>
        <a href="index.html"><i class="fa-solid fa-arrow-right-from-bracket"></i>&nbsp;&nbsp;&nbsp;Leave Session</a>
      </div>
    </div>

<!--Tom div til errorBox. Lad den ligge nederst-->
<div id="errorBox"></div>
  </body>
</html>
