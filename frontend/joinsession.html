  <head>

    <script src="js/joinsession.js" defer type="module"></script>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <title>Join Session</title>

  <body>
    <header>
      <h1 class="binaryFlowHeader">BinaryFlow</h1>

    <h2 class="subHeader">Join Session</h2>
    <div class="centerContent">
      <div id="joinSessionInput">
        <!-- Inputfelt hvor brugeren skriver det session_id, de vil joine -->
        <input
          id="joinSession"
          type="text"
          placeholder="Insert Session ID..."
        />
        <!-- Knappen kalder joinsession.js, som tjekker session_id i backend -->
          <!-- Knappen styres af joinsession.js -->
        <button class="joinSessionBtn" id="joinSessionButton">

        </button>
      </div>
    </div>
    <div id="errorBox"></div>
